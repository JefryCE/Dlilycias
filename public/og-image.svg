  </g>
  <!-- Main content -->
  <text x="600" y="250" text-anchor="middle" font-family="Georgia,serif" font-size="80" font-weight="bold" fill="white" letter-spacing="8">DLILYCIAS</text>
  <text x="600" y="320" text-anchor="middle" font-family="Georgia,serif" font-size="28" fill="#fecdd3" font-style="italic">Endulza el día más especial de mamá</text>
  <text x="600" y="380" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="#ffffffcc">Pastelería Artesanal para el Día de la Madre</text>
